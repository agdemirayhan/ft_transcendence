services:
  db:
    image: postgres:16-alpine
    container_name: ft_transcendence_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-transcendence} -d ${POSTGRES_DB:-transcendence}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: ft_transcendence_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-transcendence}:${POSTGRES_PASSWORD:-transcendence}@db:5432/${POSTGRES_DB:-transcendence}?schema=public"
      PORT: "${BACKEND_PORT:-3000}"
      JWT_SECRET: "${JWT_SECRET:-dev-only-change-me}"
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    command: sh -c "npx prisma db push && npx prisma db seed && npm run start:prod"

  frontend:
    build:
      context: ./frontend
    container_name: ft_transcendence_frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:${BACKEND_PORT:-3000}"
    ports:
      - "${FRONTEND_PORT:-3001}:3000"

  pgadmin:
    image: dpage/pgadmin4
    container_name: ft_transcendence_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data: